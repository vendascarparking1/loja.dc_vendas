<script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

  apiKey: "AIzaSyDiUxNnUpNOLfr42s9vhQLApuntCI5k41Q",

  authDomain: "dcvendas.firebaseapp.com",

  databaseURL: "https://dcvendas-default-rtdb.firebaseio.com",

  projectId: "dcvendas",

  storageBucket: "dcvendas.firebaseapp.com",

  messagingSenderId: "703988302793",

  appId: "1:703988302793:web:11b4530ca2db8d621ade18",

  measurementId: "G-NQV3GSPZG5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =========================
   SCRIPT
========================= */

let carrinho = [];

/* ID ÚNICO */
let userID = localStorage.getItem("userID");

if(!userID){

    userID = crypto.randomUUID();

    localStorage.setItem("userID",userID);

}

/* NOME FIXO */
let nomeUsuario = localStorage.getItem("nomeUsuario") || "";

/* MOSTRAR NOME FIXO */
window.onload = function(){

    let areaNome = document.getElementById("areaNome");

    if(nomeUsuario){

        areaNome.innerHTML = `

        <div style="
        background:#111;
        padding:15px;
        border-radius:15px;
        border:2px solid #00ff88;
        text-align:left;
        ">

        <b>👤 Nome:</b><br>
        ${nomeUsuario}

        <br><br>

        <b>🆔 ID:</b><br>
        ${userID.slice(0,6)}

        </div>

        `;

    }else{

        areaNome.innerHTML = `

        <div style="
        background:#111;
        padding:15px;
        border-radius:15px;
        border:2px solid #00ff88;
        ">

        <h3>🆔 Salve seu nome único</h3>

        <input type="text"
        id="nomeInput"
        placeholder="Digite seu nome"
        style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:12px;
        ">

        <br><br>

        <button onclick="salvarNome()"
        style="
        width:100%;
        background:#00aa88;
        ">
        Salvar Nome
        </button>

        </div>

        `;
    }

    mostrarFeedbacks();
}

/* MENU */
function abrir(menu){

    document.getElementById("main").style.display="none";

    document.getElementById(menu).style.display="flex";
}

function voltar(){

    document.querySelectorAll(".submenu")
    .forEach(m=>{
        m.style.display="none";
    });

    document.getElementById("main").style.display="flex";
}

/* SALVAR NOME */
function salvarNome(){

    let nome =
    document.getElementById("nomeInput").value;

    if(nome.trim()==""){
        alert("Digite um nome");
        return;
    }

    localStorage.setItem("nomeUsuario",nome);

    nomeUsuario = nome;

    location.reload();
}

/* CARRINHO */
function adicionarCarrinho(nome,valor){

    carrinho.push({nome,valor});

    atualizarCarrinho();
}

function atualizarCarrinho(){

    let lista =
    document.getElementById("listaCarrinho");

    let total =
    document.getElementById("totalCarrinho");

    lista.innerHTML="";

    let soma=0;

    carrinho.forEach((item,index)=>{

        soma += item.valor;

        lista.innerHTML += `

        <div class="itemCarrinho">

        <span>
        ${item.nome} - R$${item.valor}
        </span>

        <button class="removerBtn"
        onclick="removerItem(${index})">
        ❌
        </button>

        </div>

        `;
    });

    total.innerHTML =
    "Total: R$"+soma;

    document.getElementById("contador")
    .innerText = carrinho.length;
}

function removerItem(index){

    carrinho.splice(index,1);

    atualizarCarrinho();
}

function limparCarrinho(){

    carrinho=[];

    atualizarCarrinho();
}

/* CARRINHO FLUTUANTE */
function toggleCarrinho(){

    let popup =
    document.getElementById("carrinhoPopup");

    if(popup.style.display=="block"){

        popup.style.display="none";

    }else{

        popup.style.display="block";
    }
}

/* COMPRAR */
function comprarTudo(){

    if(carrinho.length==0){

        alert("Carrinho vazio");

        return;
    }

    let numero="556299764298";

    let msg =
    "Olá quero comprar:%0A%0A";

    let soma=0;

    carrinho.forEach(i=>{

        msg +=
        "- "+i.nome+
        " R$"+i.valor+
        "%0A";

        soma += i.valor;
    });

    msg += "%0ATotal: R$"+soma;

    window.open(
    "https://wa.me/"+numero+"?text="+msg
    );

    localStorage.setItem(
    "podeAvaliar",
    "true"
    );
}

/* ENVIAR FEEDBACK */
function enviarFeedback(){

    let podeAvaliar =
    localStorage.getItem("podeAvaliar");

    if(!nomeUsuario){

        alert("Salve seu nome primeiro");

        return;
    }

    if(!podeAvaliar){

        alert("Compre algo primeiro");

        return;
    }

    let texto =
    document.getElementById("textoFeedback").value;

    let estrelas =
    document.getElementById("notaFeedback").value;

    if(estrelas==""){

        alert("Escolha as estrelas");

        return;
    }

    if(texto.trim()==""){

        alert("Digite algo");

        return;
    }

    db.ref("feedbacks").push({

        nome:nomeUsuario,
        id:userID,
        texto:texto,
        estrelas:parseInt(estrelas),
        data:new Date().toLocaleString()

    });

    localStorage.removeItem("podeAvaliar");

    document.getElementById("textoFeedback").value="";

    document.getElementById("notaFeedback").value="";

    alert("✔ Feedback enviado");
}

/* MOSTRAR FEEDBACKS ONLINE */
function mostrarFeedbacks(){

    let area =
    document.getElementById("listaFeedbacks");

    db.ref("feedbacks").on("value",(snapshot)=>{

        area.innerHTML="";

        let dados = snapshot.val();

        if(!dados){

            document.getElementById("mediaEstrelas")
            .innerHTML =
            "⭐⭐⭐⭐⭐ (5.0)";

            return;
        }

        let lista =
        Object.values(dados).reverse();

        let soma=0;

        lista.forEach(f=>{

            soma += f.estrelas;

            let estrelas =
            "⭐".repeat(f.estrelas);

            area.innerHTML += `

            <div>

            <b>${f.nome}</b>

            <br>

            🆔 ${f.id.slice(0,6)}

            <br><br>

            <span style="
            color:gold;
            font-size:20px;
            ">
            ${estrelas}
            </span>

            <br><br>

            ${f.texto}

            <br><br>

            <small>${f.data}</small>

            </div>

            `;
        });

        let media =
        (soma/lista.length).toFixed(1);

        document.getElementById("mediaEstrelas")
        .innerHTML =
        "⭐ Média: "+media+"/5";

    });
}

</script>
