<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0c0c0c;
color:white;
overflow-x:hidden;

}

/* ================= SCROLL ================= */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#8a2be2;
border-radius:20px;
}

/* ================= HOME ================= */

#homePage{

min-height:100vh;
padding:20px;

}

.logoArea{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

margin-top:20px;
margin-bottom:30px;

}

.logoLoja{

width:130px;
height:130px;

border-radius:50%;

object-fit:cover;

border:4px solid #8a2be2;

box-shadow:
0 0 25px #8a2be2;

cursor:pointer;

}

.tituloLoja{

font-size:34px;
font-weight:bold;

margin-top:15px;

}

.subTitulo{

color:#aaa;

margin-top:5px;

}
/* ================= MENUS ================= */

.categorias{

display:flex;
flex-direction:column;

gap:15px;

}

.categoriaCard{

background:#171717;

border:2px solid #8a2be2;

border-radius:20px;

padding:18px;

display:flex;

align-items:center;

justify-content:space-between;

cursor:pointer;

transition:.25s;

}

.categoriaCard:hover{

transform:translateY(-3px);

box-shadow:
0 0 20px
rgba(138,43,226,.5);

}

.iconeCategoria{

font-size:35px;

width:60px;

text-align:center;

}

.infoCategoria{

flex:1;

padding-left:15px;

}

.infoCategoria h2{

font-size:20px;

margin-bottom:5px;

}

.infoCategoria p{

color:#aaa;

font-size:14px;

}

.seta{

font-size:30px;

color:#8a2be2;

}

/* ================= TOPBAR ================= */

.topBar{

background:#111;

padding:15px;

display:flex;

align-items:center;

gap:15px;

border-bottom:
2px solid #8a2be2;

position:sticky;

top:0;

z-index:999;

}

.btnVoltar{

width:45px;
height:45px;

border:none;

border-radius:12px;

background:#8a2be2;

color:white;

font-size:20px;

cursor:pointer;

}

.topBar h2{

font-size:22px;

}

/* ================= CATEGORIA ================= */

#paginaCategoria{

display:none;

padding-bottom:40px;

}


.gridProdutos{

padding:12px;

display:grid;

grid-template-columns:
repeat(2,minmax(0,1fr));

gap:12px;

align-items:start;

}

/* ================= GRID PRODUTOS ================= */

.gridProdutos{

padding:12px;

display:grid;

grid-template-columns:repeat(2,1fr);

gap:12px;

}

/* ================= CARD PRODUTO ================= */

.cardProduto{

background:#171717;

border:2px solid #8a2be2;

border-radius:18px;

overflow:hidden;

cursor:pointer;

transition:.25s;

}

.cardProduto:hover{

transform:translateY(-3px);

box-shadow:
0 0 15px
rgba(138,43,226,.4);

}

.cardProduto img{

width:100%;

height:140px;

object-fit:cover;

}

.cardConteudo{

padding:10px;

}

.tagProduto{

display:inline-block;

background:#8a2be2;

padding:4px 10px;

border-radius:50px;

font-size:10px;

margin-bottom:8px;

}

.cardTitulo{

font-size:16px;

font-weight:bold;

margin-bottom:8px;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

}

.cardPreco{

font-size:22px;

font-weight:bold;

color:#00ff88;

}

.cardEstoque{

margin-top:6px;

color:#aaa;

font-size:12px;

}

/* ================= PRODUTO ================= */

#paginaProduto{

display:none;

padding-bottom:40px;

}

.produtoDetalhe{

padding:15px;

}

.produtoImagem{

width:100%;

height:260px;

object-fit:cover;

border-radius:20px;

border:2px solid #8a2be2;

cursor:pointer;

}

.produtoNome{

font-size:24px;

margin-top:15px;

font-weight:bold;

}

.produtoPreco{

font-size:30px;

font-weight:bold;

color:#00ff88;

margin-top:10px;

}

.produtoDescricao{

margin-top:15px;

line-height:1.6;

color:#ccc;

font-size:14px;

}

.produtoVideo{

width:100%;

margin-top:15px;

border-radius:15px;

}

.btnCarrinhoProduto{

width:100%;

padding:16px;

border:none;

border-radius:15px;

background:#00aa88;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

margin-top:20px;

}

/* ================= FEEDBACK ================= */

#paginaFeedback{

display:none;

padding:20px;

}

#listaFeedbacks{

display:flex;

flex-direction:column;

gap:15px;

margin-top:20px;

}

/* ================= ADM ================= */

#painelAdm{

display:none;

padding-bottom:50px;

}

#loginAdm{

padding:20px;

display:flex;

flex-direction:column;

gap:15px;

}

#loginAdm input{

padding:15px;

border:none;

border-radius:12px;

background:#1a1a1a;

color:white;

}

#loginAdm button{

padding:15px;

border:none;

border-radius:12px;

background:#8a2be2;

color:white;

font-weight:bold;

cursor:pointer;

}

#admArea{

display:none;

padding:20px;

gap:15px;

flex-direction:column;

}

#admArea input,
#admArea textarea,
#admArea select{

padding:15px;

border:none;

border-radius:12px;

background:#1a1a1a;

color:white;

}

#admArea textarea{

height:120px;

resize:none;

}

#admArea button{

padding:15px;

border:none;

border-radius:12px;

background:#00aa88;

color:white;

font-weight:bold;

cursor:pointer;

}

#listaAdmProdutos{

margin-top:20px;

display:flex;

flex-direction:column;

gap:15px;

}

/* ================= CARRINHO ================= */

#carrinhoFlutuante{

position:fixed;

right:20px;

bottom:20px;

background:#00ff88;

color:black;

padding:15px 20px;

border-radius:50px;

font-weight:bold;

cursor:pointer;

z-index:99999;

box-shadow:
0 0 20px
rgba(0,255,136,.4);

}

#contador{

margin-left:5px;

}

#carrinhoPopup{

display:none;

position:fixed;

right:20px;

bottom:90px;

width:320px;

max-height:450px;

overflow:auto;

background:#111;

border:2px solid #00ff88;

border-radius:20px;

padding:15px;

z-index:99999;

}

.itemCarrinho{

background:#1a1a1a;

padding:12px;

border-radius:12px;

margin-top:10px;

display:flex;

justify-content:space-between;

align-items:center;

}

.removerBtn{

background:red;

border:none;

padding:6px 10px;

border-radius:8px;

color:white;

cursor:pointer;

}

#totalCarrinho{

margin-top:15px;

font-size:22px;

font-weight:bold;

color:#00ff88;

}

.comprarTudo{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#00aa88;

color:white;

font-weight:bold;

margin-top:15px;

cursor:pointer;

}

.limparCarrinho{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:red;

color:white;

font-weight:bold;

margin-top:10px;

cursor:pointer;

}

/* ================= ZOOM ================= */

#zoomOverlay{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.95);

justify-content:center;
align-items:center;

z-index:999999;

}

#zoomImg{

max-width:95%;
max-height:95%;

border-radius:20px;

}

/* ================= MSG ================= */

#msgCarrinho{

display:none;

position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);

background:#00ff88;

color:black;

padding:15px 25px;

border-radius:50px;

font-weight:bold;

z-index:9999999;

}

/* ================= RESPONSIVO ================= */

@media(min-width:700px){

.gridProdutos{

grid-template-columns:
repeat(2,1fr);

}

}

@media(min-width:1100px){

.gridProdutos{

grid-template-columns:
repeat(3,1fr);

}

}

</style>

<script>

// ================= FIREBASE =================

const firebaseConfig = {

apiKey: "AIzaSyDiUxNnUpNOLfr42s9vhQLApuntCI5k41Q",

authDomain: "dcvendas.firebaseapp.com",

databaseURL:
"https://dcvendas-default-rtdb.firebaseio.com",

projectId: "dcvendas",

storageBucket:
"dcvendas.appspot.com",

messagingSenderId:
"703988302793",

appId:
"1:703988302793:web:11b4530ca2db8d621ade18"

};

firebase.initializeApp(
firebaseConfig
);

const db =
firebase.database();

// ================= VARIÁVEIS =================

let categoriaAtual = "";

let produtoAtual = null;

let carrinho = [];

let clicksLogo = 0;

// ================= LOGO ADM =================

document.addEventListener(
"DOMContentLoaded",
()=>{

const logo =
document.getElementById(
"logoLoja"
);

logo.addEventListener(
"click",
()=>{

clicksLogo++;

if(clicksLogo >= 5){

clicksLogo = 0;

abrirPainelAdm();

}

setTimeout(()=>{

clicksLogo = 0;

},3000);

});

});

// ================= ADM =================

function abrirPainelAdm(){

document.getElementById(
"homePage"
).style.display = "none";

document.getElementById(
"painelAdm"
).style.display = "block";

}

function fecharAdm(){

document.getElementById(
"painelAdm"
).style.display = "none";

document.getElementById(
"homePage"
).style.display = "block";

}

// ================= LOGIN =================

function loginAdm(){

const numero =
document.getElementById(
"admNumero"
).value.trim();

const senha =
document.getElementById(
"admSenha"
).value.trim();

if(
numero === "6299764298" &&
senha === "0407"
){

document.getElementById(
"loginAdm"
).style.display = "none";

document.getElementById(
"admArea"
).style.display = "flex";

mostrarProdutosAdm();

mostrarMensagem(
"Painel liberado"
);

return;

}

alert(
"Número ou senha incorretos"
);

}

// ================= HOME =================

function voltarHome(){

document.getElementById(
"paginaCategoria"
).style.display = "none";

document.getElementById(
"paginaProduto"
).style.display = "none";

document.getElementById(
"paginaFeedback"
).style.display = "none";

document.getElementById(
"homePage"
).style.display = "block";

}

// ================= CATEGORIA =================

function abrirCategoria(
categoria
){

if(categoria === "feedback"){

document.getElementById(
"homePage"
).style.display = "none";

document.getElementById(
"paginaFeedback"
).style.display = "block";

mostrarFeedbacks();

return;

}

categoriaAtual = categoria;

document.getElementById(
"homePage"
).style.display = "none";

document.getElementById(
"paginaCategoria"
).style.display = "block";

document.getElementById(
"tituloCategoria"
).innerText =
categoria
.replaceAll("-"," ")
.toUpperCase();

carregarProdutos(
categoria
);

}

// ================= PRODUTO =================

function voltarCategoria(){

document.getElementById(
"paginaProduto"
).style.display = "none";

document.getElementById(
"paginaCategoria"
).style.display = "block";

}

// ================= MSG =================

function mostrarMensagem(
texto
){

const msg =
document.getElementById(
"msgCarrinho"
);

msg.innerHTML = texto;

msg.style.display =
"block";

setTimeout(()=>{

msg.style.display =
"none";

},2000);

}

// ================= CARREGAR PRODUTOS =================

function carregarProdutos(categoria){

const area =
document.getElementById(
"listaProdutos"
);

area.innerHTML = "";

db.ref(
"produtos/" + categoria
)
.on("value",(snapshot)=>{

area.innerHTML = "";

const dados =
snapshot.val();

if(!dados){

area.innerHTML = `
<h2 style="
text-align:center;
padding:40px;
">
Nenhum produto encontrado
</h2>
`;

return;

}

Object.keys(dados)
.forEach(id=>{

const p =
dados[id];

if(
Number(p.estoque) <= 0
){
return;
}

area.innerHTML += `

<div
class="cardProduto"
onclick="abrirProduto('${id}')">

<img
src="${p.foto}">

<div class="cardConteudo">

<div class="tagProduto">
${p.tag || "🔥 Produto"}
</div>

<div class="cardTitulo">
${p.nome}
</div>

<div class="cardPreco">
R$ ${p.preco}
</div>

<div class="cardEstoque">
📦 Estoque:
${p.estoque}
</div>

</div>

</div>

`;

});

});

}

// ================= ABRIR PRODUTO =================

function abrirProduto(id){

db.ref(
"produtos/" +
categoriaAtual +
"/" +
id
)
.once("value")
.then(snapshot=>{

produtoAtual =
snapshot.val();

if(!produtoAtual)
return;

document.getElementById(
"paginaCategoria"
).style.display = "none";

document.getElementById(
"paginaProduto"
).style.display = "block";

let html = `

<img
src="${produtoAtual.foto}"
class="produtoImagem"
onclick="abrirZoom('${produtoAtual.foto}')">

<div class="produtoNome">
${produtoAtual.nome}
</div>

<div class="produtoPreco">
R$ ${produtoAtual.preco}
</div>

<div class="produtoDescricao">
${produtoAtual.descricao || ""}
</div>

`;

if(produtoAtual.video){

html += `

<video
class="produtoVideo"
controls>

<source
src="${produtoAtual.video}">

</video>

`;

}

html += `

<button
class="btnCarrinhoProduto"
onclick="adicionarCarrinhoAtual()">

🛒 Adicionar ao Carrinho

</button>

`;

document.getElementById(
"produtoDetalhe"
).innerHTML = html;

});

}

// ================= ZOOM =================

function abrirZoom(img){

document.getElementById(
"zoomOverlay"
).style.display = "flex";

document.getElementById(
"zoomImg"
).src = img;

}

function fecharZoom(){

document.getElementById(
"zoomOverlay"
).style.display = "none";

}

// ================= ESCONDER ESGOTADOS =================

function verificarEstoque(){

db.ref("produtos")
.once("value")
.then(snapshot=>{

const dados =
snapshot.val();

if(!dados)
return;

Object.keys(dados)
.forEach(categoria=>{

Object.keys(
dados[categoria]
)
.forEach(id=>{

const produto =
dados[categoria][id];

if(
Number(produto.estoque) <= 0
){

db.ref(
"produtos/" +
categoria +
"/" +
id
)
.update({

esgotado:true

});

}

});

});

});

}

setInterval(
verificarEstoque,
10000
);

// ================= CARRINHO =================

function adicionarCarrinhoAtual(){

if(!produtoAtual) return;

carrinho.push({

nome: produtoAtual.nome,

valor: Number(
produtoAtual.preco
),

categoria:
categoriaAtual

});

atualizarCarrinho();

mostrarMensagem(
"🛒 Adicionado ao carrinho"
);

}

// ================= ATUALIZAR =================

function atualizarCarrinho(){

const lista =
document.getElementById(
"listaCarrinho"
);

const totalDiv =
document.getElementById(
"totalCarrinho"
);

lista.innerHTML = "";

let total = 0;

carrinho.forEach(
(item,index)=>{

total +=
Number(item.valor);

lista.innerHTML += `

<div class="itemCarrinho">

<div>

<b>
${item.nome}
</b>

<br>

R$ ${item.valor}

</div>

<button
class="removerBtn"
onclick="removerItem(${index})">

✖

</button>

</div>

`;

});

document.getElementById(
"contador"
).innerText =
carrinho.length;

totalDiv.innerHTML =
"Total: R$ " +
total.toFixed(2);

}

// ================= REMOVER =================

function removerItem(index){

carrinho.splice(
index,
1
);

atualizarCarrinho();

mostrarMensagem(
"❌ Item removido"
);

}

// ================= LIMPAR =================

function limparCarrinho(){

if(
carrinho.length === 0
){
return;
}

if(
!confirm(
"Deseja limpar o carrinho?"
)
){
return;
}

carrinho = [];

atualizarCarrinho();

mostrarMensagem(
"🗑 Carrinho limpo"

// ================= POPUP =================

function toggleCarrinho(){

const popup =
document.getElementById(
"carrinhoPopup"
);

popup.style.display =

popup.style.display ===
"block"

? "none"

: "block";

}

// ================= COMPRA =================

function comprarTudo(){

if(
carrinho.length === 0
){

alert(
"Carrinho vazio"
);

return;

}

let mensagem =

"🛒 NOVO PEDIDO%0A%0A";

let total = 0;

carrinho.forEach(item=>{

mensagem +=

"• " +
item.nome +
" - R$" +
item.valor +
"%0A";

total +=
Number(item.valor);

});

mensagem +=

"%0A💰 Total: R$" +
total.toFixed(2);

window.open(

"https://wa.me/556299764298?text=" +
mensagem,

"_blank"

);

baixarEstoque();

}
// ================= ESTOQUE =================

function baixarEstoque(){

db.ref("produtos")
.once("value")
.then(snapshot=>{

const dados = snapshot.val();

if(!dados) return;

const promessas = [];

carrinho.forEach(item=>{

Object.keys(dados).forEach(categoria=>{

Object.keys(dados[categoria]).forEach(id=>{

const produto =
dados[categoria][id];

if(produto.nome === item.nome){

const quantidade =
carrinho.filter(
p => p.nome === item.nome
).length;

let novoEstoque =
Number(produto.estoque || 0) - quantidade;

if(novoEstoque < 0){
novoEstoque = 0;
}

promessas.push(

db.ref(
"produtos/" +
categoria +
"/" +
id +
"/estoque"
).set(novoEstoque)

);

}

});

});

});

Promise.all(promessas)
.then(()=>{

carrinho = [];

atualizarCarrinho();

mostrarMensagem(
"✅ Pedido enviado"
);

carregarProdutos();

});

});

}
// ================= CRIAR PRODUTO =================

function criarProduto(){

const nome =
document.getElementById(
"novoNome"
).value.trim();

const preco =
document.getElementById(
"novoPreco"
).value.trim();

const estoque =
document.getElementById(
"novoEstoque"
).value.trim();

const foto =
document.getElementById(
"novaFoto"
).value.trim();

const video =
document.getElementById(
"novoVideo"
).value.trim();

const categoria =
document.getElementById(
"novaCategoria"
).value;

const descricao =
document.getElementById(
"novaDescricao"
).value.trim();

if(
!nome ||
!preco ||
!estoque ||
!foto
){

alert(
"Preencha os campos obrigatórios"
);

return;

}

const id =
db.ref()
.push()
.key;

db.ref(
"produtos/" +
categoria +
"/" +
id
)
.set({

id:id,

nome:nome,

preco:Number(preco),

estoque:Number(estoque),

foto:foto,

video:video,

descricao:descricao,

tag:"🔥 Produto",

criadoEm:Date.now()

});

limparFormulario();

mostrarProdutosAdm();

mostrarMensagem(
"✅ Produto criado"
);

}

// ================= LIMPAR =================

function limparFormulario(){

document.getElementById(
"novoNome"
).value = "";

document.getElementById(
"novoPreco"
).value = "";

document.getElementById(
"novoEstoque"
).value = "";

document.getElementById(
"novaFoto"
).value = "";

document.getElementById(
"novoVideo"
).value = "";

document.getElementById(
"novaDescricao"
).value = "";

}

// ================= LISTA ADM =================

function mostrarProdutosAdm(){

const area =
document.getElementById(
"listaAdmProdutos"
);

area.innerHTML = "";

db.ref("produtos")
.once("value")
.then(snapshot=>{

const dados =
snapshot.val();

if(!dados){

area.innerHTML = `
<h3>
Nenhum produto cadastrado
</h3>
`;

return;

}

Object.keys(dados)
.forEach(categoria=>{

Object.keys(
dados[categoria]
)
.forEach(id=>{

const p =
dados[categoria][id];

area.innerHTML += `

<div style="
background:#171717;
border:2px solid #8a2be2;
border-radius:15px;
padding:15px;
margin-top:10px;
">

<b>
${p.nome}
</b>

<br><br>

💰 R$ ${p.preco}

<br>

📦 Estoque:
${p.estoque}

<br>

📁 ${categoria}

<br><br>

<button
onclick="editarProduto('${categoria}','${id}')"
style="
background:#ff9800;
color:white;
border:none;
padding:10px;
border-radius:10px;
margin-right:10px;
cursor:pointer;
">

Editar

</button>

<button
onclick="excluirProduto('${categoria}','${id}')"
style="
background:red;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
">

Excluir

</button>

</div>

`;

});

});

});

}

// ================= EXCLUIR =================

function excluirProduto(
categoria,
id
){

if(
!confirm(
"Excluir produto?"
)
){
return;
}

db.ref(
"produtos/" +
categoria +
"/" +
id
)
.remove();

mostrarMensagem(
"🗑 Produto removido"
);

setTimeout(()=>{

mostrarProdutosAdm();

},500);

}

// ================= EDITAR =================

function editarProduto(
categoria,
id
){

db.ref(
"produtos/" +
categoria +
"/" +
id
)
.once("value")
.then(snapshot=>{

const p =
snapshot.val();

if(!p) return;

const nome =
prompt(
"Nome:",
p.nome
);

if(nome===null)
return;

const preco =
prompt(
"Preço:",
p.preco
);

if(preco===null)
return;

const estoque =
prompt(
"Estoque:",
p.estoque
);

if(estoque===null)
return;

const foto =
prompt(
"Foto:",
p.foto
);

if(foto===null)
return;

const video =
prompt(
"Vídeo:",
p.video || ""
);

if(video===null)
return;

const descricao =
prompt(
"Descrição:",
p.descricao || ""
);

db.ref(
"produtos/" +
categoria +
"/" +
id
)
.update({

nome:nome,

preco:Number(preco),

estoque:Number(estoque),

foto:foto,

video:video,

descricao:descricao

});

mostrarMensagem(
"✏ Produto atualizado"
);

setTimeout(()=>{

mostrarProdutosAdm();

},500);

});

}

// ================= FEEDBACKS =================

function mostrarFeedbacks(){

const area =
document.getElementById(
"listaFeedbacks"
);

const nomeArea =
document.getElementById(
"areaNome"
);

const mediaArea =
document.getElementById(
"mediaEstrelas"
);

if(!area) return;

if(nomeArea){

nomeArea.innerHTML =

'<div style="background:#171717;padding:15px;border-radius:15px;margin-bottom:15px;">' +

'👤 ' + nomeCliente +

'<br>' +

'🆔 ' + idCliente +

'</div>';

}

db.ref("feedbacks")
.once("value")
.then(snapshot=>{

const dados =
snapshot.val();

area.innerHTML = "";

if(!dados){

area.innerHTML =
"<h3>Nenhum feedback</h3>";

if(mediaArea)
mediaArea.innerHTML = "";

return;

}

let estrelas5 = 0;
let estrelas4 = 0;
let estrelas3 = 0;
let estrelas2 = 0;
let estrelas1 = 0;

const feedbacks =
Object.values(dados);

feedbacks.forEach(fb=>{

const nota =
Number(
fb.estrelas || 5
);

if(nota === 5) estrelas5++;
else if(nota === 4) estrelas4++;
else if(nota === 3) estrelas3++;
else if(nota === 2) estrelas2++;
else if(nota === 1) estrelas1++;

});

if(mediaArea){

mediaArea.innerHTML =

'<div style="background:#171717;padding:15px;border-radius:15px;margin-bottom:15px;line-height:2;">' +

'⭐⭐⭐⭐⭐ ' + estrelas5 + ' avaliações<br>' +

'⭐⭐⭐⭐ ' + estrelas4 + ' avaliações<br>' +

'⭐⭐⭐ ' + estrelas3 + ' avaliações<br>' +

'⭐⭐ ' + estrelas2 + ' avaliações<br>' +

'⭐ ' + estrelas1 + ' avaliações' +

'</div>';

}

feedbacks.reverse();

feedbacks.forEach(fb=>{

let dataTexto = "";

if(
fb.data &&
!isNaN(
new Date(
fb.data
).getTime()
)
){

dataTexto =

'<br><small style="color:#aaa;font-size:12px;">📅 ' +

new Date(
fb.data
).toLocaleString(
"pt-BR"
)

+ 

'</small>';

}

area.innerHTML +=

'<div style="background:#171717;padding:15px;border-radius:15px;border:1px solid #333;margin-bottom:12px;">' +

'<b>' +

(fb.nome || "Cliente") +

'</b>' +

dataTexto +

'<br><br>' +

'⭐ ' +

(fb.estrelas || 5) +

'/5' +

'<br><br>' +

(fb.texto || "") +

'</div>';

});

});

}

// ================= FEEDBACK RÁPIDO =================

function enviarFeedback(){

const texto =
prompt(
"Digite seu feedback:"
);

if(!texto)
return;

const estrelas =
prompt(
"Nota (1 a 5):",
"5"
);

const id =
db.ref()
.push()
.key;

db.ref(
"feedbacks/" + id
)
.set({

nome:nomeCliente,

id:idCliente,

texto:texto,

estrelas:Number(
estrelas || 5
),

data:Date.now()

});

mostrarMensagem(
"⭐ Feedback enviado"
);

setTimeout(()=>{

mostrarFeedbacks();

},500);

}

// ================= INICIAR =================

atualizarCarrinho();

mostrarFeedbacks();

mostrarMensagem(
"🟢 Loja carregada"
);

</script>

</html>
